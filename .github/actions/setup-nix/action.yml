name: Setup Nix
description: Install Nix and configure caches

inputs:
  cachix-auth-token:
    description: Cachix authentication token
    required: false
    default: ""
  cachix-name:
    description: Cachix cache name
    required: false
    default: ""
  niks3-push:
    description: Enable pushing to niks3-public cache (disable for untrusted sources)
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - uses: cachix/install-nix-action@4e002c8ec80594ecd40e759629461e26c8abed15 # v31
      with:
        extra_nix_config: >
          extra-substituters =
          https://cache.nixos.org/
          https://niks3-public.ncaq.net/
          https://nix-community.cachix.org/
          https://nix-on-droid.cachix.org/
          https://microvm.cachix.org/
          https://ncaq-dotfiles.cachix.org/

          extra-trusted-public-keys =
          cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY=
          niks3-public.ncaq.net-1:e/B9GomqDchMBmx3IW/TMQDF8sjUCQzEofKhpehXl04=
          nix-community.cachix.org-1:mB9FSh9qf2dCimDSUo8Zy7bkq5CX+/rkCWyvRCYg3Fs=
          nix-on-droid.cachix.org-1:56snoMJTXmDRC1Ei24CmKoUqvHJ9XCp+nidK7qkMQrU=
          microvm.cachix.org-1:oXnBc6hRE3eX5rSYdRyMYXnfzcCxC7yKPTbZXALsqys=
          ncaq-dotfiles.cachix.org-1:oEM1SL5sNteDM16I23/rFZwKl+Anca/PnEWp6LWUrws=
    - name: Setup Cachix cache
      if: inputs.cachix-auth-token != '' && inputs.cachix-name != ''
      uses: cachix/cachix-action@3ba601ff5bbb07c7220846facfa2cd81eeee15a1 # v16
      with:
        name: "${{ inputs.cachix-name }}"
        authToken: "${{ inputs.cachix-auth-token }}"
        # デーモンのpost-build-hookではなくstore scanによるクライアント側pushを使用します。
        # 通常セルフホステッドランナーでは、
        # post-build-hookのパスがデーモンから到達できなかったりするため、
        # デーモンモードは使用できません。
        # 現在ホストしているNixOSコンテナや、
        # 他の場所のUbuntu上のセルフホステッドランナーでdaemonを無効化しないと動作しないことを確認しています。
        # store scanはクライアント側で動作するため両環境で問題なく使えます。
        # 一貫性のために多少のパフォーマンスより設定を統一して両方の環境で`useDaemon`を`false`にしています。
        useDaemon: false
    - name: Setup niks3-public push
      if: inputs.niks3-push == 'true'
      uses: ./.github/actions/niks3-push
