name: Setup Nix
description: Install Nix and configure caches

inputs:
  cachix-name:
    description: Cachix cache name
    required: false
    default: ncaq
  cachix-auth-token:
    description: Cachix authentication token
    required: false
    default: ""
  niks3-endpoint:
    description: niks3 server endpoint URL
    required: false
    default: "https://niks3-public.ncaq.net"

runs:
  using: composite
  steps:
    - uses: cachix/install-nix-action@4e002c8ec80594ecd40e759629461e26c8abed15 # v31
      with:
        # セルフホストランナーでうっかり外部からの悪意あるPRを実行許可してしまい、
        # flake.nixの設定を受け入れると好きなキャッシュを入れられたりしてセキュリティリスクがあるため、
        # GitHubホストランナーでのみflake.nixの設定を自動で受け入れるようにしています。
        extra_nix_config: ${{ runner.environment == 'github-hosted' && 'accept-flake-config = true' || '' }}

    - name: Setup Cachix cache
      if: inputs.cachix-name != '' && inputs.cachix-auth-token != ''
      uses: cachix/cachix-action@3ba601ff5bbb07c7220846facfa2cd81eeee15a1 # v16
      with:
        name: "${{ inputs.cachix-name }}"
        authToken: "${{ inputs.cachix-auth-token }}"
        # フォークからのPRのみキャッシュへのプッシュをスキップ
        skipPush: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository }}
        # デーモンのpost-build-hookではなくstore scanによるクライアント側pushを使用します。
        # 通常セルフホステッドランナーでは、
        # post-build-hookのパスがデーモンから到達できなかったりするため、
        # デーモンモードは使用できません。
        # 現在ホストしているNixOSコンテナや、
        # 他の場所のUbuntu上のセルフホステッドランナーでdaemonを無効化しないと動作しないことを確認しています。
        # store scanはクライアント側で動作するため両環境で問題なく使えます。
        # 一貫性のために多少のパフォーマンスより設定を統一して両方の環境で`useDaemon`を`false`にしています。
        useDaemon: false

    - name: Setup niks3 cache
      uses: ncaq/niks3-action@e3aa293e5786158d6db0aee9f1e4f91a337df192 # dist branch
      with:
        endpoint: "${{ inputs.niks3-endpoint }}"
        use-oidc: true
        push-flake-inputs: true
        # フォークからのPRのみキャッシュへのプッシュをスキップ
        skip-push: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository }}
        # セルフホステッドランナーではNixOSコンテナのためpost-build-hookが動作しないので、
        # store-scan(差分計算)モードを使用します。
        use-daemon: false
