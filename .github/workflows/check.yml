name: check

on:
  push:
    branches: [master, main]
  pull_request:
  merge_group:

permissions:
  contents: read # リポジトリコンテンツの読み取り

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  is-trusted:
    name: is-trusted
    # 信頼できるソースからのトリガーかを判定します。
    # セルフホステッドランナーの利用を制御するために使用します。
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push' ||
      github.event_name == 'merge_group' ||
      github.event.pull_request.author_association == 'OWNER' ||
      github.event.pull_request.user.login == 'dependabot[bot]' ||
      github.event.pull_request.user.login == 'renovate[bot]'
    steps:
      - run: echo "Trusted source confirmed"

  nix-fast-build:
    name: nix-fast-build
    needs: is-trusted
    permissions:
      contents: read
      id-token: write # niks3-publicへのOIDC認証に必要
    # セルフホステッドランナーは未認証のソースからは実行しない。
    if: needs.is-trusted.result == 'success'
    runs-on: [self-hosted, Linux]
    timeout-minutes: 60 # キャッシュが切れている時は時間がかかるため長めに設定。
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-nix
        with:
          cachix-auth-token: "${{ secrets.CACHIX_AUTH_TOKEN }}"
      - run: nix run '.#nix-fast-build' -- --option eval-cache false --no-link --skip-cached --no-nom

  build-nixos:
    name: build-nixos
    needs: is-trusted
    permissions:
      contents: read
      id-token: write # niks3-publicへのOIDC認証に必要
    # セルフホステッドランナーは未認証のソースからは実行しない。
    if: needs.is-trusted.result == 'success'
    runs-on: [self-hosted, Linux]
    timeout-minutes: 60 # キャッシュが切れている時は時間がかかるため長めに設定。
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-nix
        with:
          cachix-auth-token: "${{ secrets.CACHIX_AUTH_TOKEN }}"
      - name: nix build
        run: >-
          nix eval --json .#nixosConfigurations --apply builtins.attrNames |
          jq -r '.[] | ".#nixosConfigurations.\(.).config.system.build.toplevel"' |
          xargs nix build -L --keep-going

  test-nixos-boot:
    name: test-nixos-boot
    needs: is-trusted
    permissions:
      contents: read
      id-token: write # niks3-publicへのOIDC認証に必要
    # セルフホステッドランナーは未認証のソースからは実行しない。
    if: needs.is-trusted.result == 'success'
    runs-on: [self-hosted, Linux]
    timeout-minutes: 60 # キャッシュが切れている時は時間がかかるため長めに設定。
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-nix
        with:
          cachix-auth-token: "${{ secrets.CACHIX_AUTH_TOKEN }}"
      - name: nix build
        run: >-
          nix eval --json .#testNixosBoot --apply builtins.attrNames |
          jq -r '.[] | ".#testNixosBoot.\(.)"' |
          xargs nix build -L --keep-going

  build-home-manager:
    name: build-home-manager
    permissions:
      contents: read
      id-token: write # niks3-publicへのOIDC認証に必要
    runs-on: ubuntu-24.04
    timeout-minutes: 60 # キャッシュが切れている時は時間がかかるため長めに設定。
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-nix
        with:
          cachix-auth-token: "${{ secrets.CACHIX_AUTH_TOKEN }}"
      - run: nix build -L .#homeConfigurations.x86_64-linux.activationPackage

  build-nix-on-droid:
    name: build-nix-on-droid
    needs: is-trusted
    permissions:
      contents: read
      id-token: write # niks3-publicへのOIDC認証に必要
    # セルフホステッドランナーは未認証のソースからは実行しない。
    if: needs.is-trusted.result == 'success'
    runs-on: [self-hosted, Linux]
    timeout-minutes: 360 # キャッシュが切れている時は時間がかかる上QEMUエミュレーションでのビルドになるため長めに設定。
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-nix
        with:
          cachix-auth-token: "${{ secrets.CACHIX_AUTH_TOKEN }}"
      # Nix-on-Droidのビルドはimpureモードで行う必要があります
      - run: nix build -L .#nixOnDroidConfigurations.default.activationPackage --impure
