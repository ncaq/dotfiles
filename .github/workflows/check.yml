name: check

on:
  push:
    branches: [master, main]
  pull_request:
  merge_group:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  is-trusted:
    name: is-trusted
    # 信頼できるソースからのトリガーかを判定します。
    # セルフホステッドランナーの利用を制御するために使用します。
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Log trust conditions and decide
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_HEAD_REPO_FULL_NAME: ${{ github.event.pull_request.head.repo.full_name || '' }}
          REPO_FULL_NAME: ${{ github.repository }}
          IS_PUSH: ${{ github.event_name == 'push' }}
          IS_MERGE_GROUP: ${{ github.event_name == 'merge_group' }}
          IS_INTERNAL: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
        run: |
          set -euo pipefail

          echo "is-trusted: evaluating trust conditions"
          echo "github.event_name=${EVENT_NAME}"
          echo "github.event.pull_request.head.repo.full_name=${PR_HEAD_REPO_FULL_NAME}"
          echo "github.repository=${REPO_FULL_NAME}"
          echo "condition push=${IS_PUSH}"
          echo "condition merge_group=${IS_MERGE_GROUP}"
          echo "condition internal=${IS_INTERNAL}"
          trusted="false"
          if [ "${IS_PUSH}" = "true" ] || \
            [ "${IS_MERGE_GROUP}" = "true" ] || \
            [ "${IS_INTERNAL}" = "true" ]; then
            trusted="true"
          fi
          echo "trusted=${trusted}"

          if [ "${trusted}" = "true" ]; then
            echo "Trusted source confirmed"
            exit 0
          fi

          echo "Untrusted source: self-hosted runner jobs will not run"
          exit 1

  nix-fast-build:
    name: nix-fast-build
    needs: is-trusted
    permissions:
      contents: read # リポジトリコンテンツの読み取り
      id-token: write # `ncaq/nix-composite-action`内のniks3-publicとのOIDC認証に使用
    # セルフホステッドランナーは未認証のソースからは実行しない。
    if: needs.is-trusted.result == 'success'
    runs-on: [self-hosted, Linux]
    timeout-minutes: 360 # キャッシュが切れている時は時間がかかるため長めに設定。
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-nix
      - run: >-
          nix run '.#nix-fast-build' --
          --option eval-cache false
          --no-link
          --skip-cached
          --no-nom

  # x64_64のhome-managerと、
  # Nix-on-Droidのビルドを行います。
  # 関係性は薄いですが、
  # 並列数を減らすために負荷の軽いジョブをまとめています。
  # 一応Nix-on-Droidはhome-managerベースで構築しているので、
  # 全く関係がないわけではないです。
  build-home-manager:
    name: build-home-manager
    needs: is-trusted
    permissions:
      contents: read # リポジトリコンテンツの読み取り
      id-token: write # `ncaq/nix-composite-action`内のniks3-publicとのOIDC認証に使用
    # セルフホステッドランナーは未認証のソースからは実行しない。
    if: needs.is-trusted.result == 'success'
    runs-on: [self-hosted, Linux]
    timeout-minutes: 360 # キャッシュが切れている時は時間がかかるため長めに設定。
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-nix
      - run: nix build -L .#homeConfigurations.x86_64-linux.activationPackage
      # Nix-on-Droidのビルドはimpureモードで行う必要があります
      - run: nix build -L .#nixOnDroidConfigurations.default.activationPackage --impure

  build-nixos:
    name: build-nixos
    needs: is-trusted
    permissions:
      contents: read # リポジトリコンテンツの読み取り
      id-token: write # `ncaq/nix-composite-action`内のniks3-publicとのOIDC認証に使用
    # セルフホステッドランナーは未認証のソースからは実行しない。
    if: needs.is-trusted.result == 'success'
    runs-on: [self-hosted, Linux]
    timeout-minutes: 360 # キャッシュが切れている時は時間がかかるため長めに設定。
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-nix
      - name: nix build
        run: >-
          nix eval --json .#nixosConfigurations --apply builtins.attrNames |
          jq -r '.[] | ".#nixosConfigurations.\(.).config.system.build.toplevel"' |
          xargs nix build -L --keep-going

  test-nixos-boot:
    name: test-nixos-boot
    needs: is-trusted
    permissions:
      contents: read # リポジトリコンテンツの読み取り
      id-token: write # `ncaq/nix-composite-action`内のniks3-publicとのOIDC認証に使用
    # セルフホステッドランナーは未認証のソースからは実行しない。
    if: needs.is-trusted.result == 'success'
    runs-on: [self-hosted, Linux]
    timeout-minutes: 360 # キャッシュが切れている時は時間がかかるため長めに設定。
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-nix
      - name: nix build
        run: >-
          nix eval --json .#testNixosBoot --apply builtins.attrNames |
          jq -r '.[] | ".#testNixosBoot.\(.)"' |
          xargs nix build -L --keep-going
