name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  claude-review:
    runs-on: ubuntu-24.04

    timeout-minutes: 30

    env:
      HAS_CLAUDE_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN != '' }} # ifでsecretsを参照できないことの回避。

    permissions:
      actions: read
      attestations: read
      checks: read
      contents: read
      deployments: read
      discussions: read
      id-token: write
      issues: read
      packages: read
      pages: read
      pull-requests: write
      repository-projects: read
      security-events: read
      statuses: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          fetch-depth: 50
      - uses: ./.github/actions/setup-nix
        if: runner.environment != 'github-hosted'
        with:
          cachix-auth-token: "${{ secrets.CACHIX_AUTH_TOKEN }}"
          cachix-name: ncaq-dotfiles
          attic-token: "${{ secrets.ATTIC_TOKEN }}"
      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@26ec041249acb0a944c0a47b6c0c13f05dbc5b44 # v1
        if: env.HAS_CLAUDE_TOKEN == 'true' # Dependabotでの実行など実行コンテキストが異なり認証情報がない場合はスキップ。
        continue-on-error: true # 設定変更などで想定通り動かなくなることがあっても全体のCIが失敗表示にならないようにします。
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: "/review-pr REPO: ${{ github.repository }} PR_NUMBER: ${{ github.event.pull_request.number }}"
          allowed_bots: "*" # botを弾く合理性がないので実行できるものは許可します。
          claude_args: >-
            --model opus --allowed-tools "
            Bash(gh api *issues/*/comments*),
            Bash(gh api *pulls/*/comments*),
            Bash(gh api *pulls/*/reviews*),
            Bash(gh issue:*),
            Bash(gh pr:*),
            Bash(gh search:*),
            Glob,
            Grep,
            Read,
            TodoWrite,
            WebFetch,
            WebSearch,
            mcp__github,
            mcp__github_inline_comment__create_inline_comment
            "
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options
