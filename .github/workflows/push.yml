name: push

on:
  workflow_dispatch:
  push:
    branches: master
  pull_request:
  merge_group:

permissions:
  contents: read # リポジトリコンテンツの読み取り

jobs:
  is-trusted:
    # 信頼できるソースからのトリガーかを判定します。
    # セルフホステッドランナーの利用を制御するために使用します。
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push' ||
      github.event_name == 'merge_group' ||
      github.event.pull_request.author_association == 'OWNER' ||
      github.event.pull_request.user.login == 'dependabot[bot]' ||
      github.event.pull_request.user.login == 'renovate[bot]'
    steps:
      - run: echo "Trusted source confirmed"

  list-nixos-hosts:
    permissions:
      contents: read
      id-token: write # niks3-publicへのOIDC認証に必要
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      hosts: ${{ steps.list.outputs.hosts }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-nix
        with:
          cachix-auth-token: "${{ secrets.CACHIX_AUTH_TOKEN }}"
      - id: list
        run: echo "hosts=$(nix eval --json .#nixosConfigurations --apply builtins.attrNames)" >> "$GITHUB_OUTPUT"

  nix-fast-build:
    needs: is-trusted
    permissions:
      contents: read
      id-token: write # niks3-publicへのOIDC認証に必要
    # 信頼できるソースの場合はセルフホステッドランナーで高速化し、
    # それ以外はGitHubランナーで実行します。
    # is-trustedがスキップされてもこのジョブは実行する必要があるためalways()を使用します。
    if: always() && !cancelled()
    runs-on: >-
      ${{ needs.is-trusted.result == 'success'
        && fromJSON('["self-hosted", "Linux"]') || 'ubuntu-24.04' }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-nix
        with:
          cachix-auth-token: "${{ secrets.CACHIX_AUTH_TOKEN }}"
      - run: nix run '.#nix-fast-build' -- --option eval-cache false --no-link --skip-cached --no-nom

  build-nixos:
    needs:
      - is-trusted
      - list-nixos-hosts
    permissions:
      contents: read
      id-token: write # niks3-publicへのOIDC認証に必要
    # セルフホステッドランナーは未認証のソースからは実行しない。
    if: needs.is-trusted.result == 'success'
    runs-on: [self-hosted, Linux]
    timeout-minutes: 120
    strategy:
      matrix:
        host: ${{ fromJSON(needs['list-nixos-hosts'].outputs.hosts) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-nix
        with:
          cachix-auth-token: "${{ secrets.CACHIX_AUTH_TOKEN }}"
      - run: nix build ".#nixosConfigurations.$HOST.config.system.build.toplevel"
        env:
          HOST: ${{ matrix.host }}

  build-home-manager:
    needs: is-trusted
    permissions:
      contents: read
      id-token: write # niks3-publicへのOIDC認証に必要
    # セルフホステッドランナーは未認証のソースからは実行しない。
    if: needs.is-trusted.result == 'success'
    runs-on: [self-hosted, Linux]
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-nix
        with:
          cachix-auth-token: "${{ secrets.CACHIX_AUTH_TOKEN }}"
      - run: nix build .#homeConfigurations.x86_64-linux.activationPackage

  build-nix-on-droid:
    needs: is-trusted
    permissions:
      contents: read
      id-token: write # niks3-publicへのOIDC認証に必要
    # セルフホステッドランナーは未認証のソースからは実行しない。
    if: needs.is-trusted.result == 'success'
    runs-on: [self-hosted, Linux]
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-nix
        with:
          cachix-auth-token: "${{ secrets.CACHIX_AUTH_TOKEN }}"
      # Nix-on-Droidのビルドはimpureモードで行う必要があります
      - run: nix build .#nixOnDroidConfigurations.default.activationPackage --impure
